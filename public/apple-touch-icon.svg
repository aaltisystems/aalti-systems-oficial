<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="appleTouchGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background with rounded corners effect -->
  <rect width="180" height="180" fill="url(#appleTouchGradient)" rx="40"/>

  <!-- Logo content centered - scalable version -->
  <g transform="translate(90, 90)">
    <!-- Triángulo superior -->
    <polygon points="0,-55 47,30 -47,30" fill="white" opacity="0.95" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Círculo superior derecha -->
    <circle cx="55" cy="-25" r="22" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>

    <!-- Círculo inferior izquierda -->
    <circle cx="-48" cy="25" r="25" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>

    <!-- Círculo inferior derecha -->
    <circle cx="55" cy="35" r="24" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>

    <!-- Línea central -->
    <line x1="-20" y1="0" x2="20" y2="0" stroke="white" stroke-width="1.5" opacity="0.7"/>

    <!-- Accent dot -->
    <circle cx="65" cy="-55" r="5" fill="white" opacity="1"/>
  </g>
</svg>
