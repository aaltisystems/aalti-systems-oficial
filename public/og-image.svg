<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030712;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#030712;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0" />
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative glow elements -->
  <circle cx="150" cy="100" r="200" fill="url(#glowGradient)" opacity="0.5"/>
  <circle cx="1050" cy="530" r="250" fill="url(#glowGradient)" opacity="0.4"/>

  <!-- Grid pattern background -->
  <g stroke="#6366f1" stroke-width="1" opacity="0.1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
  </g>

  <!-- Decorative AI nodes (neural network style) -->
  <g fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.6">
    <circle cx="100" cy="100" r="8" fill="#0ea5e9"/>
    <circle cx="300" cy="150" r="6" fill="#6366f1"/>
    <circle cx="500" cy="80" r="6" fill="#a855f7"/>
    <circle cx="900" cy="120" r="8" fill="#0ea5e9"/>
    <circle cx="1100" cy="200" r="6" fill="#6366f1"/>

    <!-- Connection lines -->
    <line x1="100" y1="100" x2="300" y2="150" stroke="#6366f1" stroke-width="1"/>
    <line x1="300" y1="150" x2="500" y2="80" stroke="#a855f7" stroke-width="1"/>
    <line x1="500" y1="80" x2="900" y2="120" stroke="#0ea5e9" stroke-width="1"/>
    <line x1="900" y1="120" x2="1100" y2="200" stroke="#6366f1" stroke-width="1"/>
  </g>

  <!-- Main brand icon/letter A -->
  <g opacity="0.15">
    <text x="50" y="500" font-family="'Space Grotesk', sans-serif" font-size="320" font-weight="700" fill="url(#textGradient)" font-style="normal">A</text>
  </g>

  <!-- Accent dot (AI theme) -->
  <circle cx="1100" cy="80" r="16" fill="#0ea5e9" opacity="0.4" filter="url(#glow)"/>
  <circle cx="1100" cy="80" r="8" fill="#0ea5e9" opacity="0.8"/>

  <!-- Main heading -->
  <text x="600" y="160" font-family="'Space Grotesk', sans-serif" font-size="72" font-weight="700" text-anchor="middle" fill="white">
    AALTI SYSTEMS
  </text>

  <!-- Subheading with gradient -->
  <text x="600" y="240" font-family="'Space Grotesk', sans-serif" font-size="48" font-weight="600" text-anchor="middle">
    <tspan fill="url(#textGradient)">Automatización B2B con IA</tspan>
  </text>

  <!-- Main value proposition -->
  <g>
    <text x="600" y="320" font-family="'DM Sans', sans-serif" font-size="32" font-weight="600" text-anchor="middle" fill="#ffffff">
      +40% Ventas | 24/7 Automatizado
    </text>

    <text x="600" y="370" font-family="'DM Sans', sans-serif" font-size="28" font-weight="500" text-anchor="middle" fill="#0ea5e9">
      Auditoría Gratuita
    </text>
  </g>

  <!-- Features pills -->
  <g>
    <!-- Pill 1: Lead Gen -->
    <rect x="180" y="450" width="220" height="50" rx="25" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
    <text x="290" y="483" font-family="'DM Sans', sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#6366f1">
      Lead Generation
    </text>

    <!-- Pill 2: Qualification -->
    <rect x="490" y="450" width="220" height="50" rx="25" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.6"/>
    <text x="600" y="483" font-family="'DM Sans', sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#a855f7">
      Qualification
    </text>

    <!-- Pill 3: Closing -->
    <rect x="800" y="450" width="220" height="50" rx="25" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.6"/>
    <text x="910" y="483" font-family="'DM Sans', sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#0ea5e9">
      Closing 24/7
    </text>
  </g>

  <!-- Website URL footer -->
  <text x="1150" y="610" font-family="'DM Sans', sans-serif" font-size="16" font-weight="500" text-anchor="end" fill="#64748b">
    aaltisystems.com
  </text>

  <!-- Accent line -->
  <line x1="300" y1="400" x2="900" y2="400" stroke="url(#textGradient)" stroke-width="2" opacity="0.5"/>
</svg>
